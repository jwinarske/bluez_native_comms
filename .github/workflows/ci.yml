name: CI

on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Format ────────────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart format --set-exit-if-changed lib/ test/ example/

  # ── Static analysis + pub points dry-run ─────────────────────────────────
  analyze:
    name: Dart analyze + pub dry-run
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart analyze --fatal-infos
      # Verify all pub.dev requirements pass before any PR merges
      - run: dart pub publish --dry-run

  # ── C++ unit tests ───────────────────────────────────────────────────────
  test-cpp:
    name: C++ unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 \
            libsystemd-dev \
            libgtest-dev
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure -j4

  # ── ASAN + UBSan ─────────────────────────────────────────────────────────
  asan:
    name: ASAN + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-19 libclang-rt-19-dev \
            libsystemd-dev libgtest-dev
      - run: ./scripts/asan.sh build-asan

  # ── clang-tidy ───────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 clang-tidy-19 \
            libsystemd-dev libgtest-dev
      - name: Build (for compile_commands.json)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
      - run: ./scripts/clang_tidy.sh build

  # ── Coverage (PR only) ──────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: [test-cpp]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++ \
            libsystemd-dev libgtest-dev lcov
      - run: ./scripts/coverage.sh build-cov
