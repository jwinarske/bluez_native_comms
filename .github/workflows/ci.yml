name: CI

on:
  push:    { branches: [main, develop] }
  pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Format ────────────────────────────────────────────────────────────────
  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart format --set-exit-if-changed lib/ test/ example/

  # ── Static analysis + pub points dry-run ─────────────────────────────────
  analyze:
    name: Dart analyze + pub dry-run
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - run: dart pub get
      - run: dart analyze --fatal-infos
      # Verify all pub.dev requirements pass before any PR merges
      - run: dart pub publish --dry-run

  # ── Release build (verify native layer compiles) ─────────────────────────
  build:
    name: Release build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 \
            libsystemd-dev \
            libexpat1-dev
      - name: Build sdbus-c++-xml2cpp
        run: |
          cmake -B build-codegen native/third_party/sdbus-cpp -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DSDBUSCPP_BUILD_CODEGEN=ON \
            -DSDBUSCPP_BUILD_LIBSYSTEMD=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build-codegen --target sdbus-c++-xml2cpp --parallel
      - name: Verify proxy generation
        run: |
          ./scripts/generate_proxies.sh
          git diff --exit-code native/generated/ || \
            (echo "Generated proxies are out of date. Run scripts/generate_proxies.sh" && exit 1)

  # ── C++ unit tests ───────────────────────────────────────────────────────
  test-cpp:
    name: C++ unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 \
            libsystemd-dev \
            libgtest-dev
      - name: Build + test
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure -j4

  # ── ASAN + UBSan ─────────────────────────────────────────────────────────
  asan:
    name: ASAN + UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build clang-19 \
            libsystemd-dev libgtest-dev
      - run: ./scripts/asan.sh build-asan

  # ── clang-tidy ───────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            clang-19 clang-tidy-19 \
            libsystemd-dev libgtest-dev
      - name: Build (for compile_commands.json)
        run: |
          cmake -B build native/ -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DBUILD_TESTING=ON
          cmake --build build --parallel
      - run: ./scripts/clang_tidy.sh build
